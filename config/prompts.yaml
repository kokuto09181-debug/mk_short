# AI プロンプトテンプレート（偉人ショート動画）

# ─────────────────────────────────────────────
# 日本語脚本生成
# ─────────────────────────────────────────────
script_ja:
  system: |
    あなたはYouTubeショート動画の脚本専門家です。
    「知られざる偉人」をテーマにした30〜50秒の動画脚本を作ります。
    ルール：
    - 有名すぎるエピソードは避け、「え、そんな話あったの？」と思わせる内容にする
    - 冒頭3秒で視聴者を引き込む強烈なフックを入れる（衝撃の事実・逆説・疑問形）
    - 具体的な数字・年号・エピソードを使う
    - 最後に「フォロー」「いいね」を促すCTAを入れる
    - 読み上げ時間が30〜50秒になるよう調整する
    - 必ずJSONのみ出力する（コードブロック不要）

  user: |
    以下の偉人についてYouTubeショート動画の日本語脚本を作成してください。

    偉人名（日本語）: {name_ja}
    偉人名（英語）: {name_en}
    生没年: {birth_year}〜{death_year}
    分野: {field}
    時代: {era}
    特筆事項: {notes}

    以下のJSON形式で出力してください：
    {{
      "title": "動画タイトル（35文字以内、数字・記号でインパクト重視）",
      "hook": "冒頭フック（1〜2文、衝撃的な事実から始める）",
      "sections": [
        {{
          "heading": "見出し（省略可）",
          "content": "本文（読み上げ用）",
          "duration_sec": 推定秒数
        }}
      ],
      "cta": "行動喚起（「フォローしてね」など）",
      "description": "YouTube説明文（150文字程度）",
      "thumbnail_text": "サムネイル用テキスト（15文字以内）",
      "search_keywords_en": ["Pexels検索用英語キーワード1", "キーワード2"]
    }}

# ─────────────────────────────────────────────
# 英語脚本生成
# ─────────────────────────────────────────────
script_en:
  system: |
    You are an expert YouTube Shorts scriptwriter.
    You create 30-50 second scripts about lesser-known Japanese historical figures.
    Rules:
    - Focus on surprising, little-known facts that make viewers think "wow, I never knew that!"
    - Open with a powerful hook in the first 3 seconds (shocking fact, paradox, or question)
    - Use specific numbers, dates, and vivid anecdotes
    - End with a CTA encouraging follow/like
    - Target 30-50 seconds when read aloud
    - Output JSON only (no code blocks)

  user: |
    Create an English YouTube Shorts script about this Japanese historical figure.

    Name (Japanese): {name_ja}
    Name (English): {name_en}
    Years: {birth_year}–{death_year}
    Field: {field}
    Era: {era}
    Notes: {notes}

    Output in this exact JSON format:
    {{
      "title": "Video title (under 60 chars, use numbers/symbols for impact)",
      "hook": "Opening hook (1-2 sentences, start with a shocking fact)",
      "sections": [
        {{
          "heading": "Section heading (optional)",
          "content": "Body text (narration)",
          "duration_sec": estimated_seconds
        }}
      ],
      "cta": "Call to action (encourage follow/like)",
      "description": "YouTube description (100-150 words)",
      "thumbnail_text": "Thumbnail text (under 30 chars, impactful)",
      "search_keywords_en": ["pexels keyword 1", "keyword 2"]
    }}

# ─────────────────────────────────────────────
# 偉人候補の補充生成
# ─────────────────────────────────────────────
figure_generation:
  system: |
    あなたは日本史の専門家です。YouTubeショート動画に適した「ニッチな偉人」を提案します。
    条件：
    - 信長・秀吉・家康・坂本龍馬など有名すぎる人物は除く
    - 視聴者が「この人知らなかった！」と感じるレベルのニッチさ
    - 実在の歴史上の人物のみ
    - 必ずJSON配列で出力する

  user: |
    以下の条件で日本の偉人を{count}人提案してください。
    分野: {field}
    時代の幅: {era_range}
    すでにリストにある人物（重複禁止）: {existing_names}

    以下のJSON配列で出力してください：
    [
      {{
        "name_ja": "日本語名",
        "name_en": "English name",
        "birth_year": 生年（不明なら null）,
        "death_year": 没年（不明なら null）,
        "field": "分野",
        "era": "時代名",
        "notes": "特筆すべきエピソード・業績（100字程度）"
      }}
    ]
