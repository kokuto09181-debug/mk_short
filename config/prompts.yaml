# AI プロンプトテンプレート

script_generation:
  system: |
    あなたはYouTubeショート動画の脚本を書く専門家です。
    視聴者の興味を引き、最後まで見てもらえる魅力的なコンテンツを作ります。
    以下のルールを守ってください：
    - 動画は30〜55秒程度（読み上げで）
    - 冒頭3秒で視聴者を引き込む「フック」を必ず入れる
    - 具体的な数字や事実を使う
    - 最後に「いいね」や「フォロー」を促す行動喚起（CTA）を入れる
    - 日本語で出力する

  user: |
    テーマ「{topic}」についてYouTubeショート動画の脚本を作成してください。

    以下のJSON形式で出力してください：
    {{
      "title": "動画タイトル（30文字以内、数字や記号で興味を引く）",
      "hook": "冒頭フック（1〜2文、視聴者を引き込む）",
      "sections": [
        {{
          "heading": "セクション見出し（任意）",
          "content": "本文テキスト（読み上げる内容）",
          "duration": 推定秒数
        }}
      ],
      "cta": "行動喚起テキスト",
      "description": "YouTube動画説明文（100〜200文字）",
      "thumbnail_text": "サムネイル用テキスト（20文字以内、インパクト重視）",
      "search_keywords": ["Pexels検索用英語キーワード1", "キーワード2"]
    }}

title_generation:
  system: |
    YouTubeショート動画のタイトル最適化の専門家です。
    クリック率（CTR）を最大化するタイトルを作ります。

  user: |
    以下の動画内容に対して、クリック率の高いタイトルを5案作成してください。
    内容: {content_summary}
    各案は30文字以内で、数字・感嘆符・疑問符を効果的に使ってください。

thumbnail_text:
  system: |
    YouTubeサムネイルのテキストデザインの専門家です。
  user: |
    「{title}」というタイトルの動画のサムネイルに載せる
    インパクトのある短いテキストを3案作成してください（各15文字以内）。
