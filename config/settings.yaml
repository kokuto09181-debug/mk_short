# YouTube Shorts 自動運営 設定ファイル（偉人チャンネル）

channels:
  japanese:
    name: "知られざる偉人伝 Shorts"
    description: "歴史に埋もれた偉人たちの知られざるエピソードを毎日紹介！"
    language: "ja"
    default_category: "27"  # Education
    tags: ["偉人", "歴史", "雑学", "日本史", "shorts"]

  english:
    name: "Hidden Heroes of Japan Shorts"
    description: "Daily stories of Japan's lesser-known historical figures!"
    language: "en"
    default_category: "27"  # Education
    tags: ["Japanese history", "samurai", "hidden heroes", "Japan", "shorts"]

content:
  videos_per_day: 1          # 1言語あたり1本（合計2本/日: 日本語+英語）
  languages: ["ja", "en"]

  # ニッチな分野（有名武将は避ける）
  fields:
    - 科学者・発明家
    - 女性の先駆者
    - 芸術家・文化人
    - 医師・思想家
    - 地方の英雄・反骨者
    - 外交官・先駆的外国人

video:
  width: 1080
  height: 1920
  fps: 30
  duration_target: 45      # 秒（Shorts最適）
  duration_min: 30
  duration_max: 58

  font_size_title: 68
  font_size_body: 50
  font_size_small: 36
  font_size_name: 90       # 偉人の名前を大きく表示
  font_size_subtitle: 42   # 字幕テキスト

  themes:
    - name: "samurai_dark"
      bg_color: [15, 8, 5]
      title_color: [255, 200, 50]
      text_color: [240, 235, 220]
      accent_color: [200, 60, 30]
      name_color: [255, 220, 100]

    - name: "edo_blue"
      bg_color: [5, 15, 30]
      title_color: [100, 200, 255]
      text_color: [230, 240, 255]
      accent_color: [50, 130, 200]
      name_color: [150, 220, 255]

    - name: "meiji_green"
      bg_color: [5, 20, 10]
      title_color: [100, 230, 150]
      text_color: [225, 240, 230]
      accent_color: [60, 180, 100]
      name_color: [120, 255, 160]

    - name: "heian_purple"
      bg_color: [15, 5, 25]
      title_color: [200, 150, 255]
      text_color: [235, 225, 245]
      accent_color: [150, 80, 220]
      name_color: [220, 170, 255]

tts:
  # provider: "sbv2" / "openai_tts" / "edge_tts"
  # SBV2 失敗時は自動で edge_tts にフォールバック
  japanese:
    provider: "irodori"          # Irodori-TTS VoiceDesign（ローカルGPU）
    edge_voice: "ja-JP-NanamiNeural"  # フォールバック用
    voice: "nova"
    openai_model: "tts-1-hd"
    speed: 1.05
    # ── Irodori-TTS 設定 ──
    irodori_repo: "Aratako/Irodori-TTS-500M-v2-VoiceDesign"
    irodori_device: "cuda"
    irodori_precision: "bf16"
    irodori_codec_repo: "Aratako/Semantic-DACVAE-Japanese-32dim"
    irodori_steps: 40
    irodori_cfg_text: 3.0
    irodori_cfg_caption: 3.0
    # ── Style-Bert-VITS2 設定（フォールバック用に保持） ──
    sbv2_model_path: "models/sbv2/jvnv-F2-jp/jvnv-F2_e166_s20000.safetensors"
    sbv2_config_path: "models/sbv2/jvnv-F2-jp/config.json"
    sbv2_style_vec_path: "models/sbv2/jvnv-F2-jp/style_vectors.npy"
    sbv2_device: "cuda:0"
    sbv2_default_style: "Neutral"
    sbv2_default_style_weight: 4.0
    sbv2_length: 1.05
  english:
    provider: "edge_tts"         # 英語はedge_tts（SBV2は日本語専用）
    voice: "alloy"
    openai_model: "tts-1-hd"
    edge_voice: "en-US-AriaNeural"
    speed: 1.0

bgm:
  enabled: true
  volume_db: -22.0   # ナレーションより -22dB（主役を邪魔しない程度）
  # CC0ライセンス フリー音源（pixabay.com）
  file_path: "assets/bgm/traditional_japanese.mp3"

images:
  provider: "pexels"
  per_page: 15
  orientation: "portrait"
  # 歴史的雰囲気の検索ワード（英語でPexels検索）
  default_keywords: ["ancient Japan", "samurai", "traditional Japan", "historical"]

upload:
  privacy: "public"
  made_for_kids: false
  notify_subscribers: true
  schedule_times_jst:
    - "19:00"   # 長編動画の配信スケジュール（JST）
  short_v2_schedule_times_jst:
    - "07:00"
    - "12:00"
    - "17:00"
    - "21:00"

ai:
  # backend: "anthropic" または "ollama"
  backend: "ollama"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 2500
  temperature: 0.85
  # Ollama ローカルLLM設定
  # モデル選択例:
  #   qwen3:14b    (9.3GB)  + ctx8192(2GB)  = 11GB → RTX3090に余裕で収容
  #   gemma4:26b   (17GB)   + ctx4096(1GB)  = 18GB → RTX3090に収容可
  #   qwen3:30b-a3b(19GB)   + ctx4096(2GB)  = 21GB → RTX3090ギリギリ
  ollama_model: "qwen3:14b"
  ollama_host: "http://localhost:11434"
  # コンテキスト長（モデルに合わせて調整）
  ollama_num_ctx: 8192
  # KVキャッシュ量子化（VRAM節約。Ollamaを再起動後に有効）
  ollama_kv_cache_type: "q4_0"

whisper:
  model_size: "small"        # tiny / base / small / medium（smallが速度・精度バランス◎）
  device: "cuda"             # cuda / cpu
  compute_type: "float16"    # float16 (GPU) / int8 (CPU)
  language: "ja"

notion:
  # Notion データベース設定（偉人管理）
  figures_db_name: "偉人リスト"
  # NOTION_DATABASE_ID は環境変数から取得

costs:
  monthly_budget_usd: 5.0
  alert_threshold_usd: 4.0
