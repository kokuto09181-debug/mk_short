# YouTube Shorts 自動運営 設定ファイル（偉人チャンネル）

channels:
  japanese:
    name: "知られざる偉人伝 Shorts"
    description: "歴史に埋もれた偉人たちの知られざるエピソードを毎日紹介！"
    language: "ja"
    default_category: "27"  # Education
    tags: ["偉人", "歴史", "雑学", "日本史", "shorts"]

  english:
    name: "Hidden Heroes of Japan Shorts"
    description: "Daily stories of Japan's lesser-known historical figures!"
    language: "en"
    default_category: "27"  # Education
    tags: ["Japanese history", "samurai", "hidden heroes", "Japan", "shorts"]

content:
  videos_per_day: 3          # 1言語あたり3本（合計6本/日）
  languages: ["ja", "en"]

  # ニッチな分野（有名武将は避ける）
  fields:
    - 科学者・発明家
    - 女性の先駆者
    - 芸術家・文化人
    - 医師・思想家
    - 地方の英雄・反骨者
    - 外交官・先駆的外国人

video:
  width: 1080
  height: 1920
  fps: 30
  duration_target: 45      # 秒（Shorts最適）
  duration_min: 30
  duration_max: 58

  font_size_title: 68
  font_size_body: 50
  font_size_small: 36
  font_size_name: 90       # 偉人の名前を大きく表示

  themes:
    - name: "samurai_dark"
      bg_color: [15, 8, 5]
      title_color: [255, 200, 50]
      text_color: [240, 235, 220]
      accent_color: [200, 60, 30]
      name_color: [255, 220, 100]

    - name: "edo_blue"
      bg_color: [5, 15, 30]
      title_color: [100, 200, 255]
      text_color: [230, 240, 255]
      accent_color: [50, 130, 200]
      name_color: [150, 220, 255]

    - name: "meiji_green"
      bg_color: [5, 20, 10]
      title_color: [100, 230, 150]
      text_color: [225, 240, 230]
      accent_color: [60, 180, 100]
      name_color: [120, 255, 160]

    - name: "heian_purple"
      bg_color: [15, 5, 25]
      title_color: [200, 150, 255]
      text_color: [235, 225, 245]
      accent_color: [150, 80, 220]
      name_color: [220, 170, 255]

tts:
  japanese:
    provider: "edge_tts"
    voice: "ja-JP-NanamiNeural"
    speed: 1.1
  english:
    provider: "edge_tts"
    voice: "en-US-AriaNeural"
    speed: 1.05

images:
  provider: "pexels"
  per_page: 15
  orientation: "portrait"
  # 歴史的雰囲気の検索ワード（英語でPexels検索）
  default_keywords: ["ancient Japan", "samurai", "traditional Japan", "historical"]

upload:
  privacy: "public"
  made_for_kids: false
  notify_subscribers: true
  schedule_times_jst:
    - "07:00"
    - "12:30"
    - "20:00"

ai:
  model: "claude-haiku-4-5-20251001"
  max_tokens: 2500
  temperature: 0.85

notion:
  # Notion データベース設定（偉人管理）
  figures_db_name: "偉人リスト"
  # NOTION_DATABASE_ID は環境変数から取得

costs:
  monthly_budget_usd: 5.0
  alert_threshold_usd: 4.0
