name: Get YouTube OAuth Token

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'どちらのチャンネル用か'
        required: true
        type: choice
        options:
          - 日本語チャンネル (JP)
          - 英語チャンネル (EN)

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run device flow authentication
        env:
          CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          import time
          import requests

          client_info = json.loads(os.environ["CLIENT_SECRET_JSON"])
          # installed or web app
          key = "installed" if "installed" in client_info else "web"
          client_id = client_info[key]["client_id"]
          client_secret = client_info[key]["client_secret"]

          SCOPES = "https://www.googleapis.com/auth/youtube.upload https://www.googleapis.com/auth/youtube"

          # Step 1: デバイスコードを取得
          resp = requests.post(
              "https://oauth2.googleapis.com/device/code",
              data={"client_id": client_id, "scope": SCOPES}
          )
          resp.raise_for_status()
          data = resp.json()

          device_code = data["device_code"]
          user_code = data["user_code"]
          verification_url = data["verification_url"]
          interval = data.get("interval", 5)
          expires_in = data.get("expires_in", 1800)

          print("\n" + "="*60)
          print("【ブラウザで以下にアクセスしてください】")
          print(f"URL: {verification_url}")
          print(f"コード: {user_code}")
          print("="*60)
          print("認証が完了するまで待機中...")
          print(f"（このウィンドウはこのまま残してください。最大{expires_in//60}分）\n")
          sys.stdout.flush()

          # Step 2: ポーリング
          deadline = time.time() + expires_in
          token_data = None
          while time.time() < deadline:
              time.sleep(interval)
              poll = requests.post(
                  "https://oauth2.googleapis.com/token",
                  data={
                      "client_id": client_id,
                      "client_secret": client_secret,
                      "device_code": device_code,
                      "grant_type": "urn:ietf:params:oauth:grant-type:device_code",
                  }
              )
              result = poll.json()
              if "access_token" in result:
                  token_data = result
                  break
              elif result.get("error") == "authorization_pending":
                  print(".", end="", flush=True)
              elif result.get("error") == "slow_down":
                  interval += 5
              else:
                  print(f"\nエラー: {result}")
                  sys.exit(1)

          if not token_data:
              print("\nタイムアウトしました。もう一度ワークフローを実行してください。")
              sys.exit(1)

          # token_typeをBearerに統一
          token_data["token_uri"] = "https://oauth2.googleapis.com/token"
          token_data["client_id"] = client_id
          token_data["client_secret"] = client_secret
          token_data["scopes"] = SCOPES.split()

          channel = os.environ.get("CHANNEL", "")
          suffix = "JP" if "JP" in channel else "EN"

          output = json.dumps(token_data, indent=2)

          print("\n\n" + "="*60)
          print(f"✅ 認証成功！")
          print(f"GitHub Secret名: YOUTUBE_TOKEN_JSON_{suffix}")
          print("以下のJSONを丸ごとコピーしてSecretに登録してください:")
          print("="*60)
          print(output)
          print("="*60)
          EOF
