name: Daily YouTube Shorts Generator

on:
  # 毎日JST 10:00 (UTC 01:00) に実行
  schedule:
    - cron: "0 1 * * *"
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      niche:
        description: "コンテンツニッチ (facts/motivation/money)"
        required: false
        default: "facts"
        type: choice
        options:
          - facts
          - motivation
          - money
      language:
        description: "言語 (ja/en)"
        required: false
        default: "ja"
        type: choice
        options:
          - ja
          - en
      dry_run:
        description: "ドライラン（アップロードしない）"
        required: false
        default: false
        type: boolean

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (fonts + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            fonts-noto-cjk-extra
          fc-cache -f -v

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and Upload Short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          CONTENT_NICHE: ${{ github.event.inputs.niche || 'facts' }}
          CONTENT_LANGUAGE: ${{ github.event.inputs.language || 'ja' }}
        run: |
          python src/pipeline.py \
            --niche "${{ github.event.inputs.niche || 'facts' }}" \
            --language "${{ github.event.inputs.language || 'ja' }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Upload output artifacts (7日保持)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-video-${{ github.run_number }}
          path: output/
          retention-days: 7
