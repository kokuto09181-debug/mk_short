name: Seed Notion Database

on:
  # 手動のみ（初回セットアップ時に1回実行）
  workflow_dispatch:
    inputs:
      setup_db:
        description: "Notion DBも新規作成する（初回のみ ON）"
        type: boolean
        default: false
      parent_page_id:
        description: "Notion 親ページID（setup_db=true の場合に必要）"
        type: string
        default: ""

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Notion DB (first time only)
        if: ${{ github.event.inputs.setup_db == 'true' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: "placeholder"
        run: |
          python src/pipeline.py setup-db "${{ github.event.inputs.parent_page_id }}"

      - name: Seed figures into Notion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python src/pipeline.py seed
